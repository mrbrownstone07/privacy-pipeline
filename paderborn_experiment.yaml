# ── Data ─────────────────────────────────────────────────────────────────────
# NOTE: paderborn_features.csv contains 602 579 rows — far too large for the
# k-NN graph + eigendecomposition step in a single run.  Use the stratified
# subset (8 767 rows, same scale as CWRU) for the privacy-pipeline experiment.
# If you re-extract features with the fixed extract_paderborn.py (64 kHz →
# 12 kHz resampling), regenerate the subset with:
#   python extract_paderborn.py sample --from paderborn_features.csv --n 9000 --out paderborn_subset.csv
data:
  file_path: paderborn_subset.csv
  meta_cols: [file_id, experiment, fault_size, load]
  label_col: label
  feature_groups: null               # null = all columns; or [time, frequency, wpd, acf]

# ── k-NN graph ────────────────────────────────────────────────────────────────
graph:
  n_neighbors: 27
  normalized: true

# ── Embedding ─────────────────────────────────────────────────────────────────
embedding:
  n_components: 4

# ── Noise mechanism ───────────────────────────────────────────────────────────
# mechanism: spectral_gap | resolvent_guided | ppsp | embedding
noise:
  mechanism: spectral_gap
  epsilons: [0.1, 0.25, 0.5, 0.75, 1.0, 2.0]
  params: {snr_target: 0.525}                         # extra kwargs forwarded to the mechanism constructor
  # spectral_gap params:   snr_target (float, default 0.625)
  # resolvent_guided params: distortion_budget (float, default 0.5)
  # ppsp params:           delta_frob (float, default 0.3), min_weight (float, default 0.05)
  # embedding params:      snr_target (float, default 2.0), min_weight (float, default 0.05)

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  n_splits: 10
  random_state: 42

# ── Output ────────────────────────────────────────────────────────────────────
output:
  results_dir: results_paderborn
  figures_dir: figures
  save_csv: true
  save_figures: true
  dpi: 300
